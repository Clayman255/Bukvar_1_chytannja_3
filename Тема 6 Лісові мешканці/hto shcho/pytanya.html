<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Лісові мешканці: Інтерактивне завдання</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f7f4;
            color: #333;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background-color: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        h1 {
            text-align: center;
            color: #2c7a4b;
        }

        .image-container {
            text-align: center;
            margin-bottom: 30px;
        }

        .image-container img {
            max-width: 100%;
            height: auto;
            border-radius: 10px;
            border: 3px solid #2c7a4b;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        .question-block {
            background-color: #fff;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
            display: flex;
            align-items: center; /* Вирівнювання по центру вертикально */
            gap: 15px;
            transition: transform 0.2s;
        }

        .question-block:hover {
            border-color: #2c7a4b;
            background-color: #fafdfb;
        }

        .audio-btn {
            background-color: #2c7a4b;
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0; /* Щоб кнопка не стискалася */
            transition: background-color 0.3s, transform 0.1s;
        }

        .audio-btn:hover {
            background-color: #1e5c35;
        }

        .audio-btn:active {
            transform: scale(0.95);
        }

        .audio-btn.playing {
            background-color: #e74c3c;
            animation: pulse 1.5s infinite;
        }

        .question-text {
            font-size: 1.1em;
            font-weight: 500;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(231, 76, 60, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(231, 76, 60, 0); }
            100% { box-shadow: 0 0 0 0 rgba(231, 76, 60, 0); }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Лісові мешканці</h1>
    
    <div class="image-container">
        <img src="zobrazhenya.jpg" alt="Лісові звірі на галявині">
    </div>

    <div id="questions-list">
        </div>

</div>

<script>
    // Дані про питання та аудіофайли
    const questions = [
        { id: 1, text: "1. Розгляньте малюнок.", audio: "au1.mp3" },
        { id: 2, text: "2. Кого ви тут бачите?", audio: "au2.mp3" },
        { id: 3, text: "3. Хто з них ласує малиною та медом?", audio: "au3.mp3" },
        { id: 4, text: "4. Хто полюбляє молоду кору дерев, моркву, капусту?", audio: "au4.mp3" },
        { id: 5, text: "5. Кого називають «санітарами лісів»? Чому?", audio: "au5.mp3" },
        { id: 6, text: "6. До чого на зображенні можна поставити питання «що?»?", audio: "au6.mp3" },
        { id: 7, text: "7. А питання «хто?»?", audio: "au7.mp3" }
    ];

    const questionsList = document.getElementById('questions-list');
    let currentAudio = null;
    let currentBtn = null;

    // Функція для створення HTML кожного питання
    questions.forEach(q => {
        const block = document.createElement('div');
        block.className = 'question-block';

        // Кнопка аудіо
        const btn = document.createElement('button');
        btn.className = 'audio-btn';
        btn.innerHTML = '🔊'; // Символ звуку
        btn.title = 'Прослухати питання';
        btn.onclick = () => playAudio(q.audio, btn);

        // Текст питання
        const text = document.createElement('div');
        text.className = 'question-text';
        text.innerText = q.text;

        block.appendChild(btn);
        block.appendChild(text);
        
        // Поле для відповіді прибрано

        questionsList.appendChild(block);
    });

    // Функція для відтворення аудіо
    function playAudio(file, btn) {
        // Якщо вже грає це аудіо - ставимо на паузу
        if (currentAudio && currentBtn === btn && !currentAudio.paused) {
            currentAudio.pause();
            currentAudio.currentTime = 0;
            btn.innerHTML = '🔊';
            btn.classList.remove('playing');
            return;
        }

        // Якщо грає інше аудіо - зупиняємо його
        if (currentAudio) {
            currentAudio.pause();
            currentAudio.currentTime = 0;
            if (currentBtn) {
                currentBtn.innerHTML = '🔊';
                currentBtn.classList.remove('playing');
            }
        }

        // Створюємо та запускаємо нове аудіо
        const audio = new Audio(file);
        
        audio.onplay = () => {
            btn.innerHTML = '⏸'; // Символ паузи
            btn.classList.add('playing');
        };

        audio.onended = () => {
            btn.innerHTML = '🔊';
            btn.classList.remove('playing');
            currentAudio = null;
            currentBtn = null;
        };

        audio.play().catch(e => {
            alert("Не вдалося відтворити файл: " + file + ". Перевірте, чи файл знаходиться в папці.");
            console.error(e);
        });

        currentAudio = audio;
        currentBtn = btn;
    }
</script>

</body>
</html>
